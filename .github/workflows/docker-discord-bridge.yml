# triggers on discord-bridge/** and workflow changes
name: Docker — discord-bridge

on:
  push:
    branches: [main]
    paths:
      - 'discord-bridge/**'
      - '.github/workflows/docker-discord-bridge.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/woody88/discord-bridge

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: discord-bridge/
          file: discord-bridge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=discord-bridge
          cache-to: type=gha,mode=max,scope=discord-bridge

      - name: Output image tag
        id: tag
        run: echo "value=$(echo '${{ steps.meta.outputs.tags }}' | grep 'sha-' | head -1 | cut -d: -f2)" >> $GITHUB_OUTPUT

  update-manifest:
    needs: build-and-push
    uses: Woody88/homelab-k8s/.github/workflows/image-updater.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    with:
      image: ghcr.io/woody88/discord-bridge
      tag: ${{ needs.build-and-push.outputs.tag }}
      manifest: manifests/platform/beadhub/discord-bridge.yaml
