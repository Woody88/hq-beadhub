name: Docker — discord-bridge

on:
  push:
    branches: [main]
    paths:
      - 'discord-bridge/**'
      - '.github/workflows/docker-discord-bridge.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/woody88/discord-bridge

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.extract_tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: discord-bridge/
          file: discord-bridge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=discord-bridge
          cache-to: type=gha,mode=max,scope=discord-bridge

      - name: Extract image tag
        id: extract_tag
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep 'sha-' | head -1 | cut -d: -f2)
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  patch-manifest:
    name: Patch homelab-k8s Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Clone homelab-k8s
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Woody88/homelab-k8s.git homelab-k8s
          cd homelab-k8s
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Patch manifest and push
        run: |
          cd homelab-k8s
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|ghcr.io/woody88/discord-bridge:.*|ghcr.io/woody88/discord-bridge:${IMAGE_TAG}|g" manifests/platform/beadhub/discord-bridge.yaml
          git add manifests/platform/beadhub/discord-bridge.yaml
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update discord-bridge image to ${IMAGE_TAG}" && git push
